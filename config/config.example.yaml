# Run mode: "normal" (SQLite + AES-GCM at-rest) or "demo" (in-memory).
# Override with env: VIBE_MODE=demo
mode: normal

# Optional master key for AES-256-GCM encryption of provider credentials.
# Hex (64 chars) or base64 (44 chars) representation of 32 bytes.
# When unset, the backend reads/writes data/master.key automatically.
# Override with env: VIBE_SECRET_KEY=...
# secret_key: ""
#
# Demo mode access token.
# When mode=demo and secret_key is unset, the backend auto-generates a token
# on first startup and persists it to data/demo_token.txt.
# Set secret_key to pin a specific token instead.
# Share the URL as: http://<host>:<port>?demo_token=<token>

server:
  host: "127.0.0.1"
  port: 8000
  cors_origins:
    - "http://localhost:5173"

executor:
  default_concurrency: 3
  default_queue_size: 100
  max_concurrency: 32
  max_queue_size: 10000

paths:
  images_dir: "./images"
  prompts_dir: "./prompt"
  database_path: "./data/vibe.db"

defaults:
  request_timeout_seconds: 120
  # Max reference-image upload size for img2img (bytes). Override with env:
  # VIBE_DEFAULTS_MAX_UPLOAD_BYTES.
  max_upload_bytes: 10485760  # 10 MiB
