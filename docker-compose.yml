services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vibe-backend
    restart: unless-stopped
    environment:
      # Run mode: "normal" (SQLite + AES-GCM at-rest) or "demo" (in-memory).
      # Override via shell: VIBE_MODE=demo docker compose up -d --build
      VIBE_MODE: ${VIBE_MODE:-normal}
      # Optional master key. When unset, data/master.key is generated on
      # first run. Hex (64 chars) or base64 (44 chars) for 32 bytes.
      # VIBE_SECRET_KEY: ""

      # Server / CORS — uncomment to override the values in config.yaml:
      # VIBE_SERVER_HOST: "0.0.0.0"
      # VIBE_SERVER_PORT: "8000"
      # VIBE_SERVER_CORS_ORIGINS: "http://localhost:5173,https://vibe.example.com"

      # Executor — uncomment to override:
      # VIBE_EXECUTOR_DEFAULT_CONCURRENCY: "3"
      # VIBE_EXECUTOR_DEFAULT_QUEUE_SIZE: "100"
      # VIBE_EXECUTOR_MAX_CONCURRENCY: "32"
      # VIBE_EXECUTOR_MAX_QUEUE_SIZE: "10000"

      # Paths — uncomment to override:
      # VIBE_PATHS_IMAGES_DIR: "./images"
      # VIBE_PATHS_DATABASE_PATH: "./data/vibe.db"
      # VIBE_PATHS_PROMPTS_DIR: "./prompt"

      # Defaults — uncomment to override:
      # VIBE_DEFAULTS_REQUEST_TIMEOUT_SECONDS: "120"
    volumes:
      - ${VIBE_CONFIG_DIR:-./config}:/app/config
      - ${VIBE_DATA_DIR:-./data}:/app/data
      - ${VIBE_IMAGES_DIR:-./images}:/app/images
      - ${VIBE_PROMPT_DIR:-./prompt}:/app/prompt
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: vibe-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
      - "${FRONTEND_HTTPS_PORT:-8443}:443"
    volumes:
      - ${VIBE_CERTS_DIR:-./docker/certs}:/etc/nginx/certs
      # 若您已放入真实的正式证书，请将下方自动生成脚本的映射移除或注释掉：
      - ./docker/generate-ssl.sh:/docker-entrypoint.d/generate-ssl.sh:ro
    depends_on:
      - backend
